<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes fadeIn1 { 0%,15%{opacity:0} 16%,100%{opacity:1} }
      @keyframes fadeIn2 { 0%,35%{opacity:0} 36%,100%{opacity:1} }
      @keyframes fadeIn3 { 0%,55%{opacity:0} 56%,100%{opacity:1} }
      @keyframes fadeIn4 { 0%,75%{opacity:0} 76%,100%{opacity:1} }
      @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(220px)} }
      @keyframes pulseGlow { 0%,100%{opacity:0.03} 50%{opacity:0.08} }

      .cursor { animation: blink 1s step-end infinite; }
      .line1 { animation: fadeIn1 4s ease-out forwards; }
      .line2 { animation: fadeIn2 4s ease-out forwards; }
      .line3 { animation: fadeIn3 4s ease-out forwards; }
      .line4 { animation: fadeIn4 4s ease-out forwards; }
    </style>
  </defs>

  <!-- background -->
  <rect width="800" height="220" rx="12" fill="#0A0B0D"/>

  <!-- subtle glow -->
  <ellipse cx="400" cy="110" rx="350" ry="100" fill="#E5FF00" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.05;0.02" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- terminal chrome -->
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#15171C"/>
  <rect x="0" y="12" width="800" height="24" fill="#15171C"/>
  <circle cx="24" cy="18" r="6" fill="#FF3D6E"/>
  <circle cx="44" cy="18" r="6" fill="#FFB454"/>
  <circle cx="64" cy="18" r="6" fill="#5BE39A"/>
  <text x="400" y="22" text-anchor="middle" font-family="SF Mono,Monaco,Consolas,monospace" font-size="11" fill="#5A5F6B">ori@hack-tech ~ %</text>

  <!-- separator line -->
  <line x1="0" y1="36" x2="800" y2="36" stroke="#1F2127" stroke-width="1"/>

  <!-- prompt + name -->
  <text class="line1" x="32" y="72" font-family="SF Mono,Monaco,Consolas,monospace" font-size="13" fill="#5BE39A" opacity="0">$</text>
  <text class="line1" x="52" y="72" font-family="SF Mono,Monaco,Consolas,monospace" font-size="13" fill="#9097A1" opacity="0">whoami</text>

  <!-- name display -->
  <text class="line2" x="32" y="108" font-family="Georgia,Instrument Serif,serif" font-style="italic" font-size="36" fill="#F4F1EA" opacity="0">Ori Siracki</text>
  <rect class="cursor" x="262" y="82" width="2" height="30" fill="#E5FF00"/>

  <!-- tagline -->
  <text class="line3" x="32" y="145" font-family="SF Mono,Monaco,Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#5A5F6B">// </tspan>
    <tspan fill="#9097A1">security researcher</tspan>
    <tspan fill="#2C2F38"> · </tspan>
    <tspan fill="#9097A1">ai builder</tspan>
    <tspan fill="#2C2F38"> · </tspan>
    <tspan fill="#9097A1">full-stack dev</tspan>
  </text>

  <!-- current status -->
  <text class="line4" x="32" y="180" font-family="SF Mono,Monaco,Consolas,monospace" font-size="12" opacity="0">
    <tspan fill="#5BE39A">$</tspan>
    <tspan fill="#5A5F6B"> status --current</tspan>
  </text>
  <text class="line4" x="32" y="200" font-family="SF Mono,Monaco,Consolas,monospace" font-size="12" opacity="0">
    <tspan fill="#E5FF00">BUILDING</tspan>
    <tspan fill="#5A5F6B"> social-auto-engine</tspan>
    <tspan fill="#2C2F38">  |  </tspan>
    <tspan fill="#E5FF00">HACKING</tspan>
    <tspan fill="#5A5F6B"> hack-tech.org</tspan>
    <tspan fill="#2C2F38">  |  </tspan>
    <tspan fill="#5BE39A">ONLINE</tspan>
  </text>

  <!-- scanline effect -->
  <rect width="800" height="2" fill="#F4F1EA" opacity="0.02">
    <animate attributeName="y" values="-2;220" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
